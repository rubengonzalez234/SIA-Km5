<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Restringido - SIA KM5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 py-5">
                    <div class="card-body">
                        <i class="bi bi-shield-lock-fill text-danger" style="font-size: 5rem;"></i>
                        <h1 class="display-5 fw-bold mt-3">Acceso Denegado</h1>
                        <p class="lead text-muted">Lo sentimos, tu nivel de usuario no tiene permisos para realizar esta acción o entrar a esta sección.</p>
                        <hr class="my-4 w-50 mx-auto">
                        <p class="small text-secondary mb-4">Si crees que esto es un error, contacta al Administrador del Sistema SIA KM5.</p>
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <a href="{% url 'lista_habitantes' %}" class="btn btn-primary btn-lg px-4 gap-3">Volver al Listado</a>
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg px-4">Ir al Inicio</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
