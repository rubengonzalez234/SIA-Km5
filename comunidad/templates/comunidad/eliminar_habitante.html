<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Eliminación - SIA KM5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-danger text-white text-center py-3">
                        <h4 class="mb-0">¡Atención!</h4>
                    </div>
                    <div class="card-body p-5 text-center">
                        <div class="mb-4">
                            <span style="font-size: 50px;">⚠️</span>
                        </div>
                        <h3 class="h4 mb-3">¿Estás seguro de eliminar a:</h3>
                        <p class="display-6 text-primary fw-bold">{{ habitante.nombres }} {{ habitante.apellidos }}?</p>
                        <p class="text-muted">Esta acción es permanente y borrará todos los datos asociados a este habitante del sistema.</p>
                        
                        <hr class="my-4">
                        
                        <form method="POST">
                            {% csrf_token %}
                            <div class="d-flex justify-content-center gap-3">
                                <a href="{% url 'lista_habitantes' %}" class="btn btn-secondary btn-lg px-4">
                                    No, cancelar
                                </a>
                                <button type="submit" class="btn btn-danger btn-lg px-4">
                                    Sí, eliminar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-4 text-muted small">SIA KM5 - Gestión Comunitaria Responsable</p>
            </div>
        </div>
    </div>

</body>
</html>
