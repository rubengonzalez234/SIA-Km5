<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - SIA KM5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body p-4 text-center">
                        <h4 class="mb-4">Iniciar Sesión</h4>
                        <form method="POST" class="text-start">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Usuario</label>
                                <input type="text" name="username" class="form-control" placeholder="Ej: admin" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Contraseña</label>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Entrar al Censo</button>
                        </form>
                        
                        <div class="d-flex align-items-center my-3">
                            <hr class="flex-grow-1">
                            <span class="mx-2 text-muted small">O</span>
                            <hr class="flex-grow-1">
                        </div>
                        
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100">
                            Volver a Página Pública
                        </a>
                    </div>
                </div>
                <p class="text-center mt-4 text-muted small">UPTAIET - Ingeniería en Informática</p>
            </div>
        </div>
    </div>
</body>
</html>
