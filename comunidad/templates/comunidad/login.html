<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA KM5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Bloquear el ojo gris de navegadores como Edge/Chrome */
        input::-ms-reveal, input::-ms-clear { display: none !important; }

        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0044cc 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .alert-error {
            background-color: #f8d7da;
            color: #842029;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid #f5c2c7;
        }

        .form-control {
            border-radius: 10px;
            background-color: #f8f9fa;
        }

        .input-group-text {
            border-radius: 0 10px 10px 0 !important;
            cursor: pointer;
            color: #0d6efd; /* Tu ojo azul */
            background-color: #f8f9fa;
            border-left: none;
        }

        .pass-input { border-radius: 10px 0 0 10px !important; border-right: none; }

        .btn-primary {
            background-color: #0d6efd;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card shadow">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-house-door-fill text-primary" style="font-size: 2.5rem;"></i>
                            <h2 class="fw-bold text-primary">SIA KM5</h2>
                            <p class="text-muted small">Ingreso al Sistema</p>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert-error mb-3">
                                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" onpaste="return false;">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted text-uppercase">Usuario</label>
                                <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" autocomplete="off" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
                                <div class="input-group">
                                    <input type="password" name="password" id="passwordField" class="form-control pass-input" placeholder="••••••••" required>
                                    <span class="input-group-text" id="togglePassword">
                                        <i class="bi bi-eye" id="eyeIcon"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary shadow-sm">Iniciar Sesión</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btnOjo = document.querySelector('#togglePassword');
        const campoPass = document.querySelector('#passwordField');

        // Mostrar al presionar
        const mostrar = () => campoPass.type = 'text';
        // Ocultar al soltar
        const ocultar = () => campoPass.type = 'password';

        btnOjo.addEventListener('mousedown', mostrar);
        btnOjo.addEventListener('mouseup', ocultar);
        btnOjo.addEventListener('mouseleave', ocultar);
        
        // Soporte táctil
        btnOjo.addEventListener('touchstart', (e) => { e.preventDefault(); mostrar(); });
        btnOjo.addEventListener('touchend', ocultar);

        // Seguridad: No permitir pegar
        window.onload = () => {
            document.querySelectorAll('.form-control').forEach(input => {
                input.onpaste = e => e.preventDefault();
                input.ondrop = e => e.preventDefault();
            });
        };
    </script>
</body>
</html>
